display_information:
  name: Veritype
  description: One-tap fact-checking, chart-rich verdict cards, all in channel.
  background_color: "#3F0E40"
  long_description: |
    Veritype is a Slack-native fact-checking agent. It quietly listens to channels
    it has been invited to, screens each message for verifiable claims, and offers
    a private "verify this?" prompt to the speaker. One tap fires a research agent
    that fans out web searches, weighs sources, and replies in thread with a
    Datatype-rendered verdict card.

features:
  bot_user:
    display_name: Veritype
    always_online: true
  slash_commands:
    - command: /verify
      description: Fact-check a claim with cited sources.
      usage_hint: "<claim>"
      should_escape: false
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - commands
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - channels:read
      - groups:read
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - app_home_opened
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
