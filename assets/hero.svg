  <!-- Title -->
  <text x="305" y="170" fill="#fff" font-family="Lato, sans-serif" font-weight="900" font-size="78" letter-spacing="-2">Veritype</text>
  <text x="307" y="220" fill="#BBBABC" font-family="Lato, sans-serif" font-weight="400" font-size="22" letter-spacing="0.5">A Slack-native fact-checker</text>
  <text x="307" y="250" fill="#BBBABC" font-family="Lato, sans-serif" font-weight="400" font-size="22" letter-spacing="0.5">with chart-rich, Datatype-rendered verdict cards.</text>

