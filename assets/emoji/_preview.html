<!doctype html>
<html><head><style>
  html, body { margin:0; padding:0; background:#fff; font-family: 'Lato', sans-serif; }
  body { padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
  .cell { text-align: center; }
  .cell img { width: 96px; height: 96px; display: block; margin: 0 auto 8px; }
  .name { font-size: 12px; color: #454245; font-weight: 700; }
  .row { display: flex; align-items: center; gap: 12px; margin-top: 32px; padding: 12px 16px; border: 1px solid #DDDDDD; border-radius: 8px; background: #F8F8F8; }
  .row .label { font-size: 12px; color: #616061; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin-right: 8px; }
  .small { width: 20px; height: 20px; }
  .tiny { width: 16px; height: 16px; }
</style></head>
<body>
<div class="grid">
  <div class="cell"><img src="veritype_true.png"/><div class="name">:veritype_true:</div></div>
  <div class="cell"><img src="veritype_false.png"/><div class="name">:veritype_false:</div></div>
  <div class="cell"><img src="veritype_warn.png"/><div class="name">:veritype_warn:</div></div>
  <div class="cell"><img src="veritype_unknown.png"/><div class="name">:veritype_unknown:</div></div>
</div>
<div class="row">
  <span class="label">Reaction size (20px)</span>
  <img src="veritype_true.png" class="small"/>
  <img src="veritype_false.png" class="small"/>
  <img src="veritype_warn.png" class="small"/>
  <img src="veritype_unknown.png" class="small"/>
</div>
<div class="row">
  <span class="label">Tiny (16px)</span>
  <img src="veritype_true.png" class="tiny"/>
  <img src="veritype_false.png" class="tiny"/>
  <img src="veritype_warn.png" class="tiny"/>
  <img src="veritype_unknown.png" class="tiny"/>
</div>
</body></html>
