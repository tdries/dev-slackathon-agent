<!doctype html>
<html>
<head>
<style>
  html, body { margin:0; padding:0; background: transparent; }
  body { width:128px; height:128px; }
  svg { display:block; }
</style>
</head>
<body>
<script>
const which = new URL(location.href).searchParams.get('e') || 'true';

// Slack brand palette
const COLORS = {
  true:    '#2EB67D', // Slack green
  false:   '#E01E5A', // Slack pink
  warn:    '#ECB22E', // Slack yellow
  unknown: '#616061', // Slack neutral gray
};

// Each glyph is drawn inside a 128x128 viewBox with ~15% padding (clear-space
// rule from Slack's brand guide). Stroke widths and proportions are tuned for
// legibility at 18-22px reaction size.
const GLYPHS = {
  // Decisive checkmark: short upstroke, longer downstroke. 16px stroke.
  true: `<path
    d="M 32 66 L 56 90 L 96 42"
    fill="none"
    stroke="#ffffff"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />`,
  // Equal-arm cross, 18px stroke for visual weight equal to the check.
  false: `<path
    d="M 36 36 L 92 92 M 92 36 L 36 92"
    fill="none"
    stroke="#ffffff"
    stroke-width="18"
    stroke-linecap="round"
  />`,
  // Exclamation: rounded body + dot. Body is tapered very slightly toward the
  // dot for an editorial feel.
  warn: `
    <path
      d="M 64 28 L 64 76"
      fill="none"
      stroke="#ffffff"
      stroke-width="18"
      stroke-linecap="round"
    />
    <circle cx="64" cy="98" r="9" fill="#ffffff" />
  `,
  // Question mark: open hook + dot. Drawn as a single stroked arc for clean
  // curvature.
  unknown: `
    <path
      d="M 42 50
         a 22 22 0 1 1 30 22
         q -8 5 -8 14"
      fill="none"
      stroke="#ffffff"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="64" cy="98" r="8" fill="#ffffff" />
  `,
};

const bg = COLORS[which];
const glyph = GLYPHS[which];

document.body.innerHTML = `
  <svg viewBox="0 0 128 128" width="128" height="128"
       xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="128" height="128" rx="24" ry="24" fill="${bg}" />
    ${glyph}
  </svg>
`;
</script>
</body>
</html>
